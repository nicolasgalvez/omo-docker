services:
  opencode:
    image: ghcr.io/anomalyco/opencode:1.4.0

    stdin_open: true
    tty: true
    network_mode: host
    environment:
      - TERM=${TERM:-xterm-256color}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
    volumes:
      - ./data/config:/root/.config/opencode
      - ./data/share:/root/.local/share/opencode
      - ./data/state:/root/.local/state/opencode
      - ./data/cache:/root/.cache/opencode
      - ${OPENCODE_WORKSPACE:-.}:/workspace
    working_dir: /workspace

  opencode-nvidia:
    image: ghcr.io/anomalyco/opencode:1.4.0

    stdin_open: true
    tty: true
    network_mode: host
    environment:
      - TERM=${TERM:-xterm-256color}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ./data/config:/root/.config/opencode
      - ./data/share:/root/.local/share/opencode
      - ./data/state:/root/.local/state/opencode
      - ./data/cache:/root/.cache/opencode
      - ${OPENCODE_WORKSPACE:-.}:/workspace
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["nvidia"]
